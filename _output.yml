bookdown::gitbook:
  css: style.css
  config:
    toc:
      before: |
        <li><a href="./">Ni de letras ni de ciencias</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Publicado con bookdown</a></li>
    edit: null
    download: ["pdf"]
    sharing:
      facebook: false
      twitter: true
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes